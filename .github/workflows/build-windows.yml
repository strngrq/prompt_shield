name: Build Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Build with PyInstaller
        run: python -m PyInstaller prompt_shield.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptShield-windows
          path: dist/PromptShield/
          retention-days: 30

      - name: Create zip for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path dist\PromptShield\* -DestinationPath dist\PromptShield-windows.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PromptShield-windows.zip
