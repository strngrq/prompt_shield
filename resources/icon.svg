<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BA3EC"/>
      <stop offset="100%" stop-color="#3A7BC8"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M256 28 L462 100 C462 100 472 280 256 484 C40 280 50 100 50 100 Z"
        fill="url(#shieldGrad)" stroke="#1E3A5F" stroke-width="8" stroke-linejoin="round"/>

  <!-- Inner shield highlight -->
  <path d="M256 60 L432 122 C432 122 440 272 256 452 C72 272 80 122 80 122 Z"
        fill="url(#innerGrad)" opacity="0.5"/>

  <!-- Lock body -->
  <rect x="196" y="240" width="120" height="100" rx="12" fill="#FFFFFF" opacity="0.95"/>

  <!-- Lock shackle -->
  <path d="M216 240 L216 195 C216 160 256 130 296 160 L296 195 L296 240"
        fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" opacity="0.95"/>

  <!-- Keyhole -->
  <circle cx="256" cy="278" r="16" fill="#2C5F8A"/>
  <rect x="250" y="288" width="12" height="24" rx="4" fill="#2C5F8A"/>

  <!-- Text cursor lines (representing text being shielded) -->
  <line x1="130" y1="160" x2="220" y2="160" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="150" y1="180" x2="240" y2="180" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  <line x1="272" y1="160" x2="382" y2="160" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="272" y1="180" x2="362" y2="180" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
</svg>
